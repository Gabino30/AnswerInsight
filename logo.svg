<circle cx="214" cy="38" r="5" fill="#5DCAA5"/>
<text x="40" y="110" font-family="Arial, Helvetica, sans-serif">
<tspan font-weight="700" font-size="58" fill="#185FA5">A</tspan><tspan font-weight="500" font-size="52" fill="#2C2C2A">nswer</tspan><tspan font-weight="700" font-size="58" fill="#185FA5">I</tspan><tspan font-weight="500" font-size="52" fill="#2C2C2A">nsight</tspan>
</text>
<text x="42" y="145" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="400" fill="#5F5E5A" letter-spacing="3">RESUMES AND INTERVIEW PREP</text>
</svg>
